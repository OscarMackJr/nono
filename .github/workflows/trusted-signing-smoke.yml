name: Trusted Signing Smoke Test

# Manual-only, non-destructive validation of the Azure Trusted Signing chain BEFORE the real
# v0.58.0 release. Proves: GitHub OIDC -> azure/login (FIC subject + secrets + Development env),
# then a real Trusted Signing sign of a freshly-compiled UNSIGNED, non-Microsoft binary (RBAC
# role + Public Trust profile + endpoint/account/profile vars), then that the embedded signature
# is OUR validated Trusted Signing cert. Publishes nothing. Delete once the real release is green.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  smoke:
    name: Trusted Signing smoke
    runs-on: windows-latest
    # MUST match the federated-credential subject repo:OscarMackJr/nono:environment:Development
    environment: Development
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Compile a fresh UNSIGNED non-Microsoft binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force smoke | Out-Null
          $target = "smoke\nono-smoke.exe"
          # Compile a trivial exe with the .NET Framework C# compiler -> a brand-new PE with NO
          # signature and NO Microsoft catalog association (so GAS later reads OUR embedded sig).
          $csc = "$env:WINDIR\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          'class P { static void Main() { System.Console.WriteLine("nono trusted-signing smoke"); } }' | Set-Content smoke\prog.cs
          if (Test-Path $csc) { & $csc /nologo /out:$target smoke\prog.cs }
          if (-not (Test-Path $target)) {
            # Fallback: a non-Microsoft third-party signed exe (GitHub CLI), still not catalog-backed
            $gh = (Get-Command gh -ErrorAction SilentlyContinue).Source
            if ($gh) { Copy-Item $gh $target -Force }
          }
          if (-not (Test-Path $target)) { Write-Error "Could not stage a signable non-Microsoft binary"; exit 1 }
          $before = Get-AuthenticodeSignature $target
          Write-Host "Pre-sign status: $($before.Status)  (expected NotSigned)"

      - name: Sign with Azure Trusted Signing
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\smoke
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify the embedded signature is OUR Trusted Signing cert
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature smoke\nono-smoke.exe
          Write-Host "Status: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          Write-Host "Issuer: $($sig.SignerCertificate.Issuer)"
          if ($sig.Status -ne 'Valid') {
            Write-Error "Smoke test FAILED: Authenticode status is $($sig.Status) (expected Valid)."
            exit 1
          }
          Write-Host "OK: Trusted Signing smoke test PASSED — the D-02 signing path is live."

      # Upload the CI-signed binary so it can be verified offline on a clean, NON-proxied
      # Win11 host. `if: always()` so the artifact is produced even when the verify step
      # above fails (Status: UnknownError) — that is exactly the case we want to inspect.
      # The exe is a throwaway hello-world; its embedded signature carries only the public
      # cert (already public on any signed release) — no secret is exposed.
      - name: Upload CI-signed smoke binary for offline verification
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trusted-signing-smoke-signed
          path: smoke/nono-smoke.exe
          if-no-files-found: warn
